    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .category-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .category-active .category-content {
            max-height: 5000px;
            transition: max-height 0.5s ease-in;
        }

        .chevron {
            transition: transform 0.3s ease;
        }

        .category-active .chevron {
            transform: rotate(180deg);
        }
    </style>

                <h2 class="text-xl font-bold text-gray-800 mt-2">¡Hola!</h2>
                <p class="text-sm text-gray-500">Seleccioná la sucursal de hoy:</p>
            </div>
            <div class="grid grid-cols-1 gap-4">
                <button onclick="setLocal('España 501')"
                    class="group text-left p-5 rounded-2xl border-2 border-gray-100 hover:border-red-500 active:bg-red-50 transition-all">
                    <span class="block text-xs font-bold text-gray-400 uppercase">Local 1</span>
                    <span class="text-lg font-bold text-gray-700">España 501</span>
                </button>
                <button onclick="setLocal('Mitre 338')"
                    class="group text-left p-5 rounded-2xl border-2 border-gray-100 hover:border-red-500 active:bg-red-50 transition-all">
                    <span class="block text-xs font-bold text-gray-400 uppercase">Local 2</span>
                    <span class="text-lg font-bold text-gray-700">Mitre 338</span>
                </button>
                <button onclick="setLocal('Necochea 1295')"
                    class="group text-left p-5 rounded-2xl border-2 border-gray-100 hover:border-red-500 active:bg-red-50 transition-all">

                    <span class="text-lg font-bold text-gray-700">Necochea 1295</span>
                </button>
            </div>
        </section>

        <!-- Contenido -->
        <div id="main-content" class="hidden space-y-4">
            <div class="sticky top-20 z-40">
                <input type="text" id="search" placeholder="🔍 Buscar producto..."
                    class="w-full p-4 rounded-2xl shadow-xl border-none focus:ring-2 focus:ring-red-500 text-sm"
                    onkeyup="filterProducts()">
            </div>
            <div id="inventory-container" class="space-y-3 pb-10"></div>
        </div>
    </main>

        class="hidden fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-lg border-t border-gray-100 z-50">
        <div class="max-w-md mx-auto">

        </div>
    </footer>

        let selectedLocal = "";
        let counts = {};

        function init() {
            const container = document.getElementById('inventory-container');
            container.innerHTML = "";
            inventoryData.forEach((section, sIdx) => {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = "category-block shadow-sm bg-white rounded-2xl border border-gray-100 overflow-hidden mb-3";

                const header = document.createElement('div');
                header.className = "flex items-center justify-between p-5 cursor-pointer active:bg-gray-50";
                header.onclick = () => sectionDiv.classList.toggle('category-active');
                header.innerHTML = `
                    <span class="font-black text-gray-800 uppercase text-base">${section.mainCat}</span>
                    <svg class="chevron w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                `;

                const content = document.createElement('div');
                content.className = "category-content bg-gray-50/50";

                section.subCats.forEach(sub => {
                    const subH = document.createElement('div');
                    subH.className = "text-[10px] font-bold text-red-400 px-5 pt-4 pb-1 uppercase tracking-widest";
                    subH.innerText = sub.name;
                    content.appendChild(subH);

                    sub.items.forEach(item => {
                        const row = document.createElement('div');
                        row.className = "product-item p-4 flex items-center justify-between border-b border-gray-100 last:border-none mx-2";
                        row.innerHTML = `
                            <div class="flex-1 pr-2">
                                <div class="text-[8px] text-gray-300">#${item.id}</div>
                                <div class="text-[13px] font-semibold text-gray-700">${item.name}</div>
                            </div>
                            <div class="flex items-center gap-2 bg-white p-1 rounded-xl border border-gray-100">
                                <button onclick="updateCount('${item.id}', -1, event)" class="w-8 h-8 rounded-lg bg-gray-50 text-gray-400 font-bold">-</button>
                                <input type="number" id="input-${item.id}" value="0" onchange="setManual('${item.id}', this.value)" onclick="event.stopPropagation()" class="w-10 text-center font-black text-sm border-none focus:ring-0 text-red-600">
                                <button onclick="updateCount('${item.id}', 1, event)" class="w-8 h-8 rounded-lg bg-red-600 text-white font-bold">+</button>
                            </div>
                        `;
                        content.appendChild(row);
                    });
                });

                sectionDiv.appendChild(header);
                sectionDiv.appendChild(content);
                container.appendChild(sectionDiv);
            });
        }

        function setLocal(n) {
            selectedLocal = n;
            document.getElementById('local-badge').innerText = n;
            document.getElementById('local-badge').classList.remove('hidden');
            document.getElementById('btn-back').classList.remove('hidden');
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('footer-actions').classList.remove('hidden');
        }

        function resetApp() {
            selectedLocal = "";
            counts = {};
            document.getElementById('setup-section').classList.remove('hidden');
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('footer-actions').classList.add('hidden');
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('local-badge').classList.add('hidden');
            document.getElementById('btn-back').classList.add('hidden');
            init();
        }

        function updateCount(id, d, e) {
            e.stopPropagation();
            const i = document.getElementById(`input-${id}`);
            let v = Math.max(0, (parseInt(i.value) || 0) + d);
            i.value = v; counts[id] = v;
        }

        function setManual(id, v) { counts[id] = Math.max(0, parseInt(v) || 0); }

        function filterProducts() {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.product-item').forEach(i => {
                const match = i.innerText.toLowerCase().includes(q);
                i.style.display = match ? 'flex' : 'none';
            });
            if (q.length > 0) document.querySelectorAll('.category-block').forEach(b => b.classList.add('category-active'));
        }

        function generateReport() {
            if (!selectedLocal) return;
            let h = `<html><head><meta charset="UTF-8"><style>td,th{border:0.5pt solid black;font-family:Calibri;padding:4px;} .m{background-color:#002060;color:white;font-weight:bold;} .s{background-color:#C6E0B4;font-weight:bold;}</style></head><body><table><tr><th colspan="3" style="font-size:16pt;">LOCAL: ${selectedLocal}</th></tr><tr style="background-color:#002060;color:white;"><th>Código</th><th>Producto</th><th>Stock</th></tr>`;
            inventoryData.forEach(sec => {
                h += `<tr><td class="m"></td><td class="m">${sec.mainCat}</td><td class="m"></td></tr>`;
                sec.subCats.forEach(sub => {
                    h += `<tr><td class="s">${sub.name}</td><td class="s"></td><td class="s"></td></tr>`;
                    sub.items.forEach(it => h += `<tr><td>${it.id}</td><td>${it.name}</td><td style="text-align:center;font-weight:bold;">${counts[it.id] || 0}</td></tr>`);
                });
            });
            h += `</table></body></html>`;
            const b = new Blob([h], { type: 'application/vnd.ms-excel' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b);
            a.download = `Stock_${selectedLocal}_${new Date().toLocaleDateString().replace(/\//g, '-')}.xls`;
            a.click();
            document.getElementById('modal').classList.remove('hidden');
        }

        window.onload = init;
