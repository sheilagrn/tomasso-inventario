<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomasso Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .input-stock:focus { outline: 2px solid #e11d48; }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .product-item { transition: transform 0.1s ease; }
        .product-item:active { transform: scale(0.98); }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="bg-black text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-red-600 tracking-tighter">TOMASSO <span class="text-white font-light text-sm uppercase tracking-widest ml-1">Stock</span></h1>
            <div id="local-badge" class="bg-red-600 text-[10px] px-2 py-1 rounded-full uppercase font-bold">Sin Local</div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <!-- Local Selection -->
        <section id="setup-section" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <label class="block text-gray-700 font-bold mb-3">Seleccionar Local:</label>
            <div class="grid grid-cols-1 gap-2">
                <button onclick="setLocal('España 501')" class="local-btn border-2 border-gray-200 p-3 rounded-xl text-left hover:border-red-500 transition-colors">Local 1 - España 501</button>
                <button onclick="setLocal('Mitre 338')" class="local-btn border-2 border-gray-200 p-3 rounded-xl text-left hover:border-red-500 transition-colors">Local 2 - Mitre 338</button>
                <button onclick="setLocal('Necochea 1295')" class="local-btn border-2 border-gray-200 p-3 rounded-xl text-left hover:border-red-500 transition-colors">Local 3 - Necochea 1295</button>
            </div>
        </section>

        <!-- Search Bar -->
        <div class="relative">
            <input type="text" id="search" placeholder="Buscar producto..." 
                class="w-full p-4 rounded-xl shadow-sm border-none focus:ring-2 focus:ring-red-500"
                onkeyup="filterProducts()">
        </div>

        <!-- Inventory Sections -->
        <div id="inventory-container" class="space-y-6 opacity-50 pointer-events-none">
            <!-- JS injects here -->
        </div>
    </main>

    <!-- Footer Action -->
    <footer class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-md border-t border-gray-200 z-40">
        <div class="max-w-md mx-auto">
            <button onclick="generateReport()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-red-200 flex items-center justify-center gap-2 transition-all">
                <span>📊</span> DESCARGAR EXCEL (CON COLORES)
            </button>
        </div>
    </footer>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-6 z-[100]">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center space-y-4 shadow-2xl">
            <div class="text-5xl animate-bounce">✅</div>
            <h2 class="text-2xl font-bold text-gray-800">¡Listo!</h2>
            <p class="text-gray-600 text-sm">El archivo Excel se ha descargado correctamente en tu dispositivo.</p>
            <button onclick="closeModal()" class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-xl font-bold transition-colors uppercase tracking-wide">Cerrar</button>
        </div>
    </div>

    <script>
        const inventoryData = [

                        { id: "61411", name: "AQUARIUS NARANJA 237ml"},

                        { id: "61413", name: "AQUARIUS POMELO 237ml"},

                        { id: "45274", name: "FANTA NARANJA 237ml"},
                        { id: "45278", name: "SPRITE 237ml"}
                    ]},
                    { name: "Bebidas Grandes", items: [
                        { id: "61574", name: "SPRITE ZERO GRANDE" },
                        { id: "45242", name: "AGUA 1.5l" },
                        { id: "45243", name: "AGUA SABORIZADA 1.5l" },
                        { id: "45283", name: "COCA COLA GRANDE" },

                        { id: "45288", name: "FANTA NARANJA GRANDE" },

                    ]},
                    { name: "Cervezas", items: [
                        { id: "45248", name: "ANDES IPA" }, { id: "45249", name: "ANDES NEGRA" },
                        { id: "45250", name: "ANDES ROJA" }, { id: "45251", name: "ANDES RUBIA" },
                        { id: "45252", name: "BRAHMA" }, { id: "45253", name: "BUDWEISER" },
                        { id: "45255", name: "CORONA 410ml" }, { id: "45257", name: "PATAGONIA 24.7" },
                        { id: "45258", name: "PATAGONIA AMBER" }, { id: "45259", name: "PATAGONIA OSO" },
                        { id: "45260", name: "PATAGONIA WEISSE" }, { id: "45261", name: "QUILMES" },
                        { id: "45263", name: "STELLA ARTOIS" }
                    ]}
                ]
            },
            { 
                mainCat: "Empanadas",
                subCats: [
                    { name: "Empanadas Clasicas", items: [
                        { id: "45318", name: "EMPANADA CARNE" },
                        { id: "45319", name: "EMPANADA CARNE PICANTE" },
                        { id: "45320", name: "EMPANADA CEBOLLA Y QUESO" },

                    ]},

                    ]}
                ]
            },
            {

                subCats: [
                    { name: "Postres", items: [

                        { id: "100553", name: "GIO BANANA CON CHOCOLATE CON MANI" },
                        { id: "100546", name: "GIO FRAMBUESAS BAÑADAS AMERICAN COOKIES"},
                        { id: "100544", name: "GIO FRAMBUESAS BAÑADAS EN DOBLE CHOCOLATE" },
                        { id: "100550", name: "GIO FRAMBUESAS BAÑADAS EN CHOCO BLANCO Y PISTACHO" },
                        { id: "100548", name: "GIO FRAMBUESAS BAÑADAS EN CHOCOLATE SEMIAMARGO" },
                        { id: "100552", name: "GIO FRUTILLA BAÑADAS AMERICAN COOKIES" },
                        { id: "100554", name: "GIO FRUTILLAS BAÑADAS EN CHOCOLATE SEMIAMARGO" },
                        { id: "100547", name: "GIO FRUTILLAS BAÑADAS EN DOBLE CHOCOLATE" },
                        { id: "100545", name: "GIO MORAS BAÑADAS EN DOBLE CHOCOLATE" },
                        { id: "93957", name: "PALETA HELADA COOKIE CREAM" },
                        { id: "93955", name: "PALETA HELADA DULCE DE LECHE" },
                        { id: "93956", name: "PALETA HELADA FRUTILLA AL AGUA" }
                    ]}
                ]
            },
            {
                mainCat: "Panificados / Papelera",
                subCats: [
                    { name: "Panificados", items: [
                        { id: "60382", name: "MP - PAN CIABATTA" },
                        { id: "79053", name: "MP - MASA PIZZETA RECTANGULAR" },
                        { id: "45981", name: "MP - PIZZETA BLANCA" },
                        { id: "45991", name: "MP - XG MASA BLANCA" }
                    ]},
                    { name: "Papelera", items: [
                        { id: "45915", name: "Bobina papel" },
                        { id: "74927", name: "Bolsa Kraft N4 TOMASSO" },
                        { id: "74928", name: "Bolsa Kraft N5 TOMASSO" },
                        { id: "45923", name: "CAJA CITADELI 3 EMPANADAS" },
                        { id: "45924", name: "CAJA CITADELI 6 EMPANADAS" },
                        { id: "45925", name: "CAJA CITADELI XG - PIZZA" },
                        { id: "45931", name: "Cosito de la pizza" }
                    ]}
                ]
            },
            {
                mainCat: "Congelados Sin TACC",
                subCats: [
                    { name: "Empanadas Sin Tacc", items: [
                        { id: "45292", name: "EMP. SIN TACC JyQ x3u" },
                        { id: "45293", name: "EMP. SIN TACC CARNE x3u" }
                    ]},
                    { name: "Pizza / Chipa", items: [
                        { id: "45353", name: "MUZZA SIN TACC" },
                        { id: "45521", name: "CHIPA CONGELADO SIN TACC" }
                    ]}
                ]
            }
        ];

        let selectedLocal = "";
        const counts = {};

        function init() {
            const container = document.getElementById('inventory-container');
            inventoryData.forEach(section => {
                const mainHeader = document.createElement('div');
                mainHeader.className = "bg-slate-700 text-white text-center py-1 text-xs font-bold uppercase tracking-widest rounded-t-lg mt-4";
                mainHeader.innerText = section.mainCat;
                container.appendChild(mainHeader);

                section.subCats.forEach(sub => {
                    const subDiv = document.createElement('div');
                    subDiv.className = "bg-green-100 text-green-800 text-[10px] font-bold px-3 py-1 border-b border-green-200";
                    subDiv.innerText = sub.name;
                    container.appendChild(subDiv);

                    sub.items.forEach(item => {
                        const row = document.createElement('div');
                        row.className = "product-item bg-white p-4 flex items-center justify-between border-b border-gray-50 last:rounded-b-lg";
                        row.innerHTML = `
                            <div class="flex-1">
                                <div class="text-[10px] text-gray-400 font-mono">#${item.id}</div>
                                <div class="font-bold text-gray-800 text-sm leading-tight">${item.name}</div>
                            </div>
                            <div class="flex items-center gap-3">
                                <button onclick="update('${item.id}', -1)" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center font-bold active:bg-gray-200">-</button>
                                <input type="number" id="input-${item.id}" value="0" 
                                    onchange="setManual('${item.id}', this.value)"
                                    class="input-stock w-10 text-center font-bold text-md bg-transparent">
                                <button onclick="update('${item.id}', 1)" class="w-8 h-8 rounded-full bg-red-50 text-red-600 flex items-center justify-center font-bold active:bg-red-100">+</button>
                            </div>
                        `;
                        container.appendChild(row);
                    });
                });
            });
        }

        function setLocal(name) {
            selectedLocal = name;
            document.getElementById('local-badge').innerText = name;
            document.getElementById('setup-section').style.display = 'none';
            document.getElementById('inventory-container').classList.remove('opacity-50', 'pointer-events-none');
        }

        function update(id, delta) {
            const input = document.getElementById(`input-${id}`);
            let val = parseInt(input.value) || 0;
            val = Math.max(0, val + delta);
            input.value = val;
            counts[id] = val;
        }

        function setManual(id, val) {
            counts[id] = Math.max(0, parseInt(val) || 0);
        }

        function filterProducts() {
            const query = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.product-item').forEach(item => {
                item.style.display = item.innerText.toLowerCase().includes(query) ? 'flex' : 'none';
            });
        }

        function generateReport() {
            if (!selectedLocal) return;

            const blueMain = "#002060";
            const greenSub = "#C6E0B4";

            let excelHtml = `
                <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
                <head><meta charset="UTF-8">
                <style>
                    table { border-collapse: collapse; }
                    td, th { border: 0.5pt solid black; font-family: Calibri, sans-serif; font-size: 11pt; }
                    .header { background-color: ${blueMain}; color: white; font-weight: bold; text-align: center; }
                    .main-cat { background-color: ${blueMain}; color: white; font-weight: bold; }
                    .sub-cat { background-color: ${greenSub}; color: black; font-weight: bold; }
                    .total-row { font-weight: bold; background-color: #f2f2f2; }
                    .num-cell { text-align: center; font-weight: bold; }
                </style>
                </head>
                <body>
                <table>
                    <tr><th colspan="3" style="font-size: 16pt; font-weight: bold;">LOCAL: ${selectedLocal}</th></tr>
                    <tr><th class="header" width="120">Código</th><th class="header" width="300">Producto</th><th class="header" width="80">Stock</th></tr>`;

            inventoryData.forEach(section => {
                excelHtml += `<tr><td class="main-cat"></td><td class="main-cat">${section.mainCat}</td><td class="main-cat"></td></tr>`;
                section.subCats.forEach(sub => {
                    excelHtml += `<tr><td class="sub-cat">${sub.name}</td><td class="sub-cat"></td><td class="sub-cat"></td></tr>`;
                    sub.items.forEach(item => {
                        excelHtml += `<tr><td>${item.id}</td><td>${item.name}</td><td class="num-cell">${counts[item.id] || 0}</td></tr>`;
                    });
                    excelHtml += `<tr class="total-row"><td>TOTAL ${sub.name}</td><td></td><td></td></tr>`;
                });
            });

            excelHtml += `</table></body></html>`;

            const blob = new Blob([excelHtml], { type: 'application/vnd.ms-excel' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            const dateStr = new Date().toLocaleDateString().replace(/\//g, '-');
            a.href = url;
            a.download = `Stock_${selectedLocal}_${dateStr}.xls`;
            a.click();
            window.URL.revokeObjectURL(url);

            // Mostrar el modal de confirmación de descarga
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        window.onload = init;
    </script>
</body>
</html>
