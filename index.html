<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomasso Inventario</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- SheetJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .category-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .category-active .category-content { max-height: 5000px; }
    </style>
</head>

<body class="pb-32">

<header class="bg-black text-white p-4 sticky top-0">
    <h1 class="text-xl font-bold text-red-600">TOMASSO</h1>
</header>

<main class="max-w-md mx-auto p-4">

    <button onclick="generateReport()"
        class="w-full bg-red-600 text-white font-bold py-4 rounded-xl">
        GENERAR EXCEL
    </button>

</main>

<script>

const inventoryData = [
    {
        mainCat: "Bebidas",
        subCats: [
            {
                name: "Bebidas Chicas",
                items: [
                    { id: "61319", name: "AGUA BENEDICTINO CHICA" },
                    { id: "61800", name: "AGUA CON GAS CHICA" }
                ]
            }
        ]
    }
];

let selectedLocal = "España 501";
let counts = {};

async function generateReport() {
    try {
        const response = await fetch("Inventario.xlsx");
        const buffer = await response.arrayBuffer();

        const wb = XLSX.read(buffer, { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];

        let row = 4; // ajustá según tu plantilla

        inventoryData.forEach(sec => {
            XLSX.utils.sheet_add_aoa(ws, [[sec.mainCat]], { origin: `B${row}` });
            row++;

            sec.subCats.forEach(sub => {
                XLSX.utils.sheet_add_aoa(ws, [[sub.name]], { origin: `A${row}` });
                row++;

                sub.items.forEach(it => {
                    XLSX.utils.sheet_add_aoa(ws, [[
                        it.id,
                        it.name,
                        counts[it.id] || 0
                    ]], { origin: `A${row}` });
                    row++;
                });
            });
        });

        XLSX.writeFile(wb, `Stock_${selectedLocal}.xlsx`);

    } catch (err) {
        console.error("Error generando Excel:", err);
        alert("No se pudo cargar Inventario.xlsx");
    }
}

</script>

</body>
</html>
